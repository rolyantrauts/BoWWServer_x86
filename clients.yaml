server:
  temp_dir: "/tmp/boww/"
  dest_dir: "./output/"

groups:
  - name: "bedroom"
    sample_rate: 16000
    channels: 1
    arbitration_timeout_ms: 200
    vad_threshold: 0.75
    vad_no_voice_ms: 2000
    preroll_seconds: 2.0
    output: "alsa"       
    device: "plughw:0,0" 
    authoritative_wakeword:
      enabled: true
      type: "ratio"      # 'ratio', 'leading', or 'average'
      threshold: 0.90    # The F32 model's raw probability must hit 90% to count as a "hit"
      ratio: 0.50        # The server hits must equal at least 50% of the client's total frames

clients:
  - guid: "871fb1f9-7ecf-426e-a5ce-a6ad67cfdd72"
    group: "bedroom"
